<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje enviado · Chillominka</title>
  <link rel="icon" type="image/png" href="Imagenes/logo.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f5f0e8;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{background:#fff;border-radius:20px;padding:48px 44px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.10);}
    .icon{font-size:56px;margin-bottom:20px;}
    h1{font-size:26px;color:#0d2b1f;margin-bottom:12px;}
    p{color:#5a6a62;font-size:15px;line-height:1.6;margin-bottom:28px;}
    a{display:inline-block;background:#2e7d46;color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;}
    a:hover{background:#1f6b37;}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>¡Gracias por tu mensaje!</h1>
    <p>Hemos recibido tu consulta correctamente. Nos pondremos en contacto contigo en menos de 48 horas.</p>
    <a href="https://chillominka.com">Volver al inicio</a>
  </div>
</body>
</html>
